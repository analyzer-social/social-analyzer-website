<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تسجيل الدخول...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.SUPABASE_URL = '{{ SUPABASE_URL }}';
        window.SUPABASE_ANON_KEY = '{{ SUPABASE_ANON_KEY }}';
    </script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .container { text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h2>جاري تسجيل الدخول...</h2>
        <p>يرجى الانتظار</p>
    </div>
    
    <script src="/static/config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        const username = urlParams.get('username');
        const firstName = urlParams.get('first_name');
        
        if (userId) {
            const localToken = btoa(`${userId}:${Date.now()}`);
            localStorage.setItem('bio_token', localToken);
            localStorage.setItem('bio_user_id', userId);
            localStorage.setItem('bio_username', username || firstName);
            
            // التحقق من وجود المستخدم في Supabase
            async function setupUser() {
                try {
                    const supabaseClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
                    
                    const { data: existingUser } = await supabaseClient
                        .from('bio_pages')
                        .select('user_id')
                        .eq('user_id', parseInt(userId))
                        .maybeSingle();
                    
                    if (!existingUser) {
                        // لا حاجة لإنشاء مستخدم هنا، سيتم إنشاؤه عند حفظ البيانات أول مرة
                        console.log('مستخدم جديد، سيتم إنشاء صفحته عند أول حفظ');
                    }
                    
                    window.location.href = '/dashboard';
                } catch (error) {
                    console.error('Error:', error);
                    window.location.href = '/dashboard';
                }
            }
            
            setupUser();
        } else {
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        }
    </script>
</body>
</html>
