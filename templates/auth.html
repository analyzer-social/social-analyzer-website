<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="OXJkNinGB3mqTHTdKGapfzumI5_QIIsdwnVySZ59FX0" />
    <title>جاري تسجيل الدخول...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.SUPABASE_URL = '{{ SUPABASE_URL }}';
        window.SUPABASE_ANON_KEY = '{{ SUPABASE_ANON_KEY }}';
    </script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            margin: 0;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .container { text-align: center; }
        .error-box {
            background: rgba(220, 53, 69, 0.9);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .success-box {
            background: rgba(40, 167, 69, 0.9);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h2>جاري تسجيل الدخول...</h2>
        <p id="statusText">يرجى الانتظار، جاري التحقق من بياناتك</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        const username = urlParams.get('username');
        const firstName = urlParams.get('first_name');
        const lastName = urlParams.get('last_name');
        const authDate = urlParams.get('auth_date');
        const hash = urlParams.get('hash');
        
        const statusDiv = document.getElementById('statusText');
        
        // =====================================================
        // دالة إرسال إشعار إلى بوت المدير
        // =====================================================
        async function sendNewUserNotification(userId, firstName, username, languageCode) {
            const botToken = '{{ TELEGRAM_BOT_TOKEN }}';
            const adminId = '{{ ADMIN_TELEGRAM_ID }}';
            
            // التحقق من وجود التوكن ومعرف المدير
            if (!botToken || botToken === '' || botToken === 'None') {
                console.warn('⚠️ TELEGRAM_BOT_TOKEN غير مضبوط في متغيرات البيئة');
                return;
            }
            if (!adminId || adminId === '' || adminId === 'None') {
                console.warn('⚠️ ADMIN_TELEGRAM_ID غير مضبوط في متغيرات البيئة');
                return;
            }
            
            const message = `🆕 مستخدم جديد!\n👤 الاسم: ${firstName || 'غير محدد'}\n🆔 المعرف: @${username || 'غير محدد'}\n🆔 ID: ${userId}\n🌐 اللغة: ${languageCode || 'ar'}\n📅 التاريخ: ${new Date().toLocaleString('ar')}`;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: adminId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                
                if (response.ok) {
                    console.log('✅ تم إرسال الإشعار إلى المدير');
                } else {
                    console.error('❌ فشل إرسال الإشعار:', await response.text());
                }
            } catch (error) {
                console.error('❌ خطأ في إرسال الإشعار:', error);
            }
        }
        
        async function showError(message) {
            statusDiv.innerHTML = `<div class="error-box">❌ ${message}<br><button onclick="window.location.href='/'">العودة للرئيسية</button></div>`;
        }
        
        async function showSuccess(message) {
            statusDiv.innerHTML = `<div class="success-box">✅ ${message}<br><button onclick="window.location.href='/dashboard'">الدخول للوحة التحكم</button></div>`;
            document.querySelector('.loader').style.display = 'none';
        }
        
        if (!userId || !hash) {
            showError('بيانات المصادقة غير مكتملة. الرجاء المحاولة مرة أخرى.');
        } else {
            // =====================================================
            // تحسين الأمان: إضافة صلاحية للجلسة (7 أيام)
            // =====================================================
            const localToken = btoa(`${userId}:${Date.now()}`);
            const expiresIn = 7 * 24 * 60 * 60 * 1000; // 7 أيام
            const expiresAt = Date.now() + expiresIn;
            
            localStorage.setItem('bio_token', localToken);
            localStorage.setItem('bio_user_id', userId);
            localStorage.setItem('bio_username', username || firstName || `user_${userId}`);
            localStorage.setItem('bio_first_name', firstName || '');
            localStorage.setItem('bio_last_name', lastName || '');
            localStorage.setItem('bio_expires_at', expiresAt.toString());
            
            console.log('تم حفظ بيانات المستخدم محلياً مع صلاحية 7 أيام');
            
            async function setupUserInDatabase() {
                try {
                    const supabaseClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
                    
                    statusDiv.innerText = 'جاري التحقق من حسابك...';
                    
                    const { data: existingUser, error: selectError } = await supabaseClient
                        .from('app_users')
                        .select('id, username, first_name, is_banned')
                        .eq('id', parseInt(userId))
                        .maybeSingle();
                    
                    if (selectError && selectError.code !== 'PGRST116') {
                        console.error('خطأ في البحث:', selectError);
                        throw new Error('خطأ في التحقق من المستخدم');
                    }
                    
                    if (existingUser) {
                        // التحقق من حظر المستخدم
                        if (existingUser.is_banned === true) {
                            console.warn('⚠️ مستخدم محظور:', userId);
                            showError('حسابك محظور. الرجاء التواصل مع الدعم للمزيد من المعلومات.');
                            return;
                        }
                        
                        console.log('المستخدم موجود مسبقاً:', existingUser);
                        showSuccess('تم تسجيل الدخول بنجاح! مرحباً بعودتك.');
                    } else {
                        statusDiv.innerText = 'جاري إنشاء حسابك الجديد...';
                        
                        const newUser = {
                            id: parseInt(userId),
                            username: username || `user_${userId}`,
                            first_name: firstName || '',
                            last_name: lastName || '',
                            is_banned: false,
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString()
                        };
                        
                        const { data: insertedUser, error: insertError } = await supabaseClient
                            .from('app_users')
                            .insert([newUser])
                            .select();
                        
                        if (insertError) {
                            console.error('خطأ في إنشاء المستخدم:', insertError);
                            
                            const response = await fetch('/api/user/create', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    telegram_id: userId,
                                    username: username || `user_${userId}`,
                                    first_name: firstName || '',
                                    last_name: lastName || ''
                                })
                            });
                            
                            const result = await response.json();
                            
                            if (result.success) {
                                console.log('تم إنشاء المستخدم عبر API:', result);
                                // إرسال إشعار للمدير عند إنشاء مستخدم جديد
                                await sendNewUserNotification(userId, firstName, username, 'ar');
                                showSuccess('تم إنشاء حسابك بنجاح! مرحباً بك.');
                            } else {
                                throw new Error(result.error || 'فشل في إنشاء المستخدم');
                            }
                        } else {
                            console.log('تم إنشاء مستخدم جديد بنجاح:', insertedUser);
                            // إرسال إشعار للمدير عند إنشاء مستخدم جديد
                            await sendNewUserNotification(userId, firstName, username, 'ar');
                            showSuccess('تم إنشاء حسابك بنجاح! مرحباً بك.');
                        }
                    }
                    
                } catch (error) {
                    console.error('خطأ في المصادقة:', error);
                    showError(error.message || 'حدث خطأ أثناء تسجيل الدخول');
                }
            }
            
            setupUserInDatabase();
        }
    </script>
</body>
</html>
