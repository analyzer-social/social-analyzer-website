<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطأ في تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .error-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .error-icon { font-size: 60px; margin-bottom: 20px; }
        h2 { color: #e53e3e; margin-bottom: 15px; }
        p { color: #718096; margin-bottom: 25px; }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">❌</div>
        <h2>حدث خطأ في تسجيل الدخول</h2>
        <p>عذراً، لم نتمكن من إكمال عملية تسجيل الدخول عبر Google.</p>
        <p style="font-size: 12px;">خطأ: {{ error }}</p>
        <a href="/" class="btn">العودة للرئيسية</a>
    </div>
</body>
</html>
