<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم صفحة البايو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0/css/all.css">
    
    <!-- Favicon and App Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/static/assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/assets/icons/favicon-16x16.png">
    <link rel="manifest" href="/static/assets/icons/site.webmanifest">
    <link rel="mask-icon" href="/static/assets/icons/safari-pinned-tab.svg" color="#667eea">
    <meta name="msapplication-TileColor" content="#667eea">
    <meta name="theme-color" content="#667eea">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .user-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-info i {
            margin-left: 8px;
        }
        .card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e9ecef;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .card h3 {
            margin-bottom: 20px;
            color: #667eea;
            border-right: 4px solid #667eea;
            padding-right: 12px;
            font-size: 1.1rem;
        }
        button {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2d3748;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .platform-input {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .platform-input i {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            color: white;
            font-size: 22px;
        }
        .platform-input input {
            flex: 1;
        }
        .custom-link-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .custom-link-item input:first-child {
            width: 30%;
        }
        .custom-link-item input:last-child {
            width: 60%;
        }
        .remove-link {
            background: #dc3545;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
        }
        .add-link {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
        }
        .save-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .page-url {
            background: linear-gradient(135deg, #f0f4ff, #e9ecef);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .page-url .url-text {
            direction: ltr;
            display: inline-block;
            background: white;
            padding: 8px 15px;
            border-radius: 25px;
            font-size: 14px;
            font-family: monospace;
        }
        .copy-btn {
            background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .copy-btn:hover {
            transform: translateY(-2px);
        }
        .success-msg, .error-msg {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .success-msg {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .row-2cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .logout-btn {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        .preview-btn {
            background: linear-gradient(135deg, #17a2b8, #138496);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        small {
            display: block;
            margin-top: 5px;
            color: #718096;
            font-size: 12px;
        }
        .contacts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            .row-2cols { grid-template-columns: 1fr; }
            .contacts-grid { grid-template-columns: 1fr; }
            .custom-link-item input:first-child,
            .custom-link-item input:last-child { width: 100%; }
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loading-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 إعدادات صفحة البايو</h1>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="userDisplayName">مرحباً بك</span>
                <button class="logout-btn" onclick="logout()" style="margin-right: 0;">🚪 تسجيل الخروج</button>
            </div>
        </div>

        <div id="successMsg" class="success-msg">
            <i class="fas fa-check-circle"></i> <span id="successText">تم حفظ التغييرات بنجاح!</span>
        </div>
        <div id="errorMsg" class="error-msg">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText">حدث خطأ، يرجى المحاولة مرة أخرى</span>
        </div>

        <!-- المعلومات الشخصية -->
        <div class="card">
            <h3><i class="fas fa-user"></i> المعلومات الشخصية</h3>
            <div class="form-group">
                <label>🖼️ رابط الصورة الشخصية (اختياري)</label>
                <input type="url" id="avatarUrl" placeholder="https://example.com/avatar.jpg">
            </div>

            <div class="row-2cols">
                <div class="form-group">
                    <label>📝 الاسم المعروض</label>
                    <input type="text" id="displayName" placeholder="الاسم الذي سيظهر للزوار">
                </div>
                <div class="form-group">
                    <label>🔗 رابط صفحتك</label>
                    <div class="page-url">
                        <i class="fas fa-globe"></i>
                        <span class="url-text" id="pageUrlFull">analyzer.social/bio/</span>
                        <span id="pageUrlValue" style="color:#667eea;font-weight:bold;">...</span>
                        <button class="copy-btn" onclick="copyPageUrl()">
                            <i class="fas fa-copy"></i> نسخ الرابط
                        </button>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>📖 السيرة الذاتية</label>
                <textarea id="bio" placeholder="اكتب نبذة قصيرة عن نفسك..."></textarea>
            </div>

            <div class="form-group">
                <label>🎨 الثيم</label>
                <select id="theme">
                    <option value="default">🌞 افتراضي</option>
                    <option value="dark">🌙 داكن</option>
                    <option value="green">🍃 أخضر</option>
                    <option value="pink">🌸 وردي</option>
                    <option value="ocean">🌊 محيط</option>
                </select>
            </div>
        </div>

        <!-- حسابات التواصل الاجتماعي -->
        <div class="card">
            <h3><i class="fas fa-share-alt"></i> حسابات التواصل الاجتماعي</h3>
            <div class="platform-input">
                <i class="fab fa-youtube" style="background:#ff0000;"></i>
                <input type="text" id="youtube" placeholder="اسم المستخدم في يوتيوب">
            </div>
            <div class="platform-input">
                <i class="fab fa-instagram" style="background:#e1306c;"></i>
                <input type="text" id="instagram" placeholder="اسم المستخدم في انستقرام">
            </div>
            <div class="platform-input">
                <i class="fab fa-tiktok" style="background:#000000;"></i>
                <input type="text" id="tiktok" placeholder="اسم المستخدم في تيك توك">
            </div>
            <div class="platform-input">
                <i class="fab fa-facebook-f" style="background:#1877f2;"></i>
                <input type="text" id="facebook" placeholder="اسم المستخدم في فيسبوك">
            </div>
            <div class="platform-input">
                <i class="fab fa-twitter" style="background:#1da1f2;"></i>
                <input type="text" id="twitter" placeholder="اسم المستخدم في X">
            </div>
        </div>

        <!-- جهات الاتصال (جديد) -->
        <div class="card">
            <h3><i class="fas fa-address-card"></i> معلومات الاتصال</h3>
            <div class="contacts-grid">
                <div class="form-group">
                    <label>📱 رقم الجوال (واتساب)</label>
                    <input type="tel" id="phoneNumber" placeholder="مثال: 966512345678">
                    <small>📌 سيظهر زر اتصال وزر واتساب مباشرة</small>
                </div>
                <div class="form-group">
                    <label>✉️ البريد الإلكتروني</label>
                    <input type="email" id="emailAddress" placeholder="example@domain.com">
                </div>
            </div>
        </div>

        <!-- الروابط المخصصة -->
        <div class="card">
            <h3><i class="fas fa-link"></i> روابط مخصصة</h3>
            <div id="customLinksContainer"></div>
            <button type="button" class="add-link" onclick="addCustomLink()">
                <i class="fas fa-plus"></i> إضافة رابط
            </button>
        </div>

        <button class="save-btn" onclick="saveBioPage()">
            <i class="fas fa-save"></i> حفظ التغييرات
        </button>
        
        <button class="preview-btn" onclick="previewBioPage()">
            <i class="fas fa-eye"></i> معاينة صفحة البايو
        </button>
    </div>

    <div id="loadingOverlay" class="loading" style="display: none;">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>جاري حفظ البيانات...</p>
        </div>
    </div>

    <script src="/static/config.js"></script>
    <script>
        // =====================================================
        // إعدادات Supabase
        // =====================================================
        const SUPABASE_URL = '{{ SUPABASE_URL }}';
        const SUPABASE_ANON_KEY = '{{ SUPABASE_ANON_KEY }}';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // متغيرات عامة
        let currentUserId = null;
        let currentPageUrl = null;
        let customLinks = [];
        let userData = {};
        
        // =====================================================
        // دوال العرض والتحكم
        // =====================================================
        
        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMsg');
            document.getElementById('successText').innerText = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            document.getElementById('errorText').innerText = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        // =====================================================
        // دالة نسخ الرابط
        // =====================================================
        
        async function copyPageUrl() {
            if (!currentPageUrl) {
                showError('⚠️ لا يوجد رابط للحفظ بعد، قم بحفظ البيانات أولاً');
                return;
            }
            
            const fullUrl = `https://social-analyzer-website.onrender.com/bio/${currentPageUrl}`;
            
            try {
                await navigator.clipboard.writeText(fullUrl);
                showSuccess('✅ تم نسخ الرابط بنجاح!');
                
                // تغيير النص مؤقتاً
                const copyBtn = document.querySelector('.copy-btn');
                const originalHTML = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fas fa-check"></i> تم النسخ!';
                setTimeout(() => {
                    copyBtn.innerHTML = originalHTML;
                }, 2000);
            } catch (err) {
                // Fallback للهواتف القديمة
                const textarea = document.createElement('textarea');
                textarea.value = fullUrl;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showSuccess('✅ تم نسخ الرابط بنجاح!');
            }
        }
        
        // =====================================================
        // دوال جهات الاتصال
        // =====================================================
        
        function getContacts() {
            return {
                phone: document.getElementById('phoneNumber').value.trim(),
                email: document.getElementById('emailAddress').value.trim()
            };
        }
        
        function loadContacts(contacts) {
            if (contacts) {
                document.getElementById('phoneNumber').value = contacts.phone || '';
                document.getElementById('emailAddress').value = contacts.email || '';
            }
        }
        
        // =====================================================
        // دوال الروابط المخصصة
        // =====================================================
        
        function renderCustomLinks() {
            const container = document.getElementById('customLinksContainer');
            if (!container) return;
            container.innerHTML = '';
            customLinks.forEach((link, index) => {
                const div = document.createElement('div');
                div.className = 'custom-link-item';
                div.innerHTML = `
                    <input type="text" placeholder="العنوان" value="${escapeHtml(link.title)}" onchange="updateCustomLink(${index}, 'title', this.value)">
                    <input type="url" placeholder="https://..." value="${escapeHtml(link.url)}" onchange="updateCustomLink(${index}, 'url', this.value)">
                    <button class="remove-link" onclick="removeCustomLink(${index})"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(div);
            });
        }
        
        function updateCustomLink(index, field, value) {
            customLinks[index][field] = value;
        }
        
        function addCustomLink() {
            if (customLinks.length >= 10) {
                showError('الحد الأقصى هو 10 روابط مخصصة');
                return;
            }
            customLinks.push({ title: 'رابط جديد', url: 'https://' });
            renderCustomLinks();
        }
        
        function removeCustomLink(index) {
            customLinks.splice(index, 1);
            renderCustomLinks();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // =====================================================
        // دالة حفظ البيانات الرئيسية
        // =====================================================
        
        async function saveBioPage() {
            if (!currentUserId) {
                showError('الرجاء تسجيل الدخول أولاً');
                window.location.href = '/';
                return;
            }
            
            showLoading();
            
            try {
                const accounts = {};
                const youtube = document.getElementById('youtube').value.trim();
                const instagram = document.getElementById('instagram').value.trim();
                const tiktok = document.getElementById('tiktok').value.trim();
                const facebook = document.getElementById('facebook').value.trim();
                const twitter = document.getElementById('twitter').value.trim();
                
                if (youtube) accounts.youtube = youtube.replace('@', '');
                if (instagram) accounts.instagram = instagram.replace('@', '');
                if (tiktok) accounts.tiktok = tiktok.replace('@', '');
                if (facebook) accounts.facebook = facebook;
                if (twitter) accounts.twitter = twitter;
                
                const bioData = {
                    avatar_url: document.getElementById('avatarUrl').value || null,
                    display_name: document.getElementById('displayName').value || userData.username || 'مستخدم',
                    bio: document.getElementById('bio').value || null,
                    theme_name: document.getElementById('theme').value,
                    accounts: accounts,
                    custom_links: customLinks,
                    contacts: getContacts(),
                    updated_at: new Date().toISOString()
                };
                
                console.log('جاري حفظ البيانات:', bioData);
                
                if (currentPageUrl) {
                    // تحديث صفحة موجودة
                    const { data, error } = await supabaseClient
                        .from('bio_pages')
                        .update(bioData)
                        .eq('user_id', parseInt(currentUserId))
                        .select();
                    
                    if (error) throw error;
                    showSuccess('✅ تم تحديث صفحة البايو بنجاح!');
                    
                } else {
                    // إنشاء صفحة جديدة - رابط عشوائي
                    const randomId = Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 4);
                    const pageUrl = randomId;
                    
                    const newData = {
                        user_id: parseInt(currentUserId),
                        page_url: pageUrl,
                        ...bioData,
                        is_active: true,
                        views_count: 0,
                        created_at: new Date().toISOString()
                    };
                    
                    const { data, error } = await supabaseClient
                        .from('bio_pages')
                        .insert([newData])
                        .select();
                    
                    if (error) throw error;
                    
                    currentPageUrl = pageUrl;
                    document.getElementById('pageUrlValue').innerText = currentPageUrl;
                    showSuccess('✅ تم إنشاء صفحة البايو بنجاح!');
                }
                
            } catch (error) {
                console.error('خطأ في الحفظ:', error);
                showError(error.message || 'حدث خطأ أثناء حفظ البيانات');
            } finally {
                hideLoading();
            }
        }
        
        // =====================================================
        // تحميل البيانات من قاعدة البيانات
        // =====================================================
        
        async function loadBioData() {
            if (!currentUserId) return;
            
            try {
                console.log('جاري تحميل بيانات المستخدم:', currentUserId);
                
                const { data, error } = await supabaseClient
                    .from('bio_pages')
                    .select('*')
                    .eq('user_id', parseInt(currentUserId))
                    .maybeSingle();
                
                if (error) {
                    console.error('خطأ في التحميل:', error);
                    return;
                }
                
                if (data) {
                    console.log('تم تحميل البيانات:', data);
                    
                    document.getElementById('avatarUrl').value = data.avatar_url || '';
                    document.getElementById('displayName').value = data.display_name || '';
                    document.getElementById('bio').value = data.bio || '';
                    document.getElementById('theme').value = data.theme_name || 'default';
                    
                    const accounts = data.accounts || {};
                    document.getElementById('youtube').value = accounts.youtube || '';
                    document.getElementById('instagram').value = accounts.instagram || '';
                    document.getElementById('tiktok').value = accounts.tiktok || '';
                    document.getElementById('facebook').value = accounts.facebook || '';
                    document.getElementById('twitter').value = accounts.twitter || '';
                    
                    // تحميل جهات الاتصال
                    loadContacts(data.contacts || {});
                    
                    currentPageUrl = data.page_url;
                    document.getElementById('pageUrlValue').innerText = currentPageUrl;
                    customLinks = data.custom_links || [];
                    renderCustomLinks();
                } else {
                    console.log('لا توجد صفحة بايو سابقة');
                }
                
            } catch (error) {
                console.error('خطأ في تحميل البيانات:', error);
            }
        }
        
        // =====================================================
        // دوال المصادقة والمستخدم
        // =====================================================
        
        async function loadUserData() {
            currentUserId = localStorage.getItem('bio_user_id');
            const telegramUsername = localStorage.getItem('bio_username');
            
            if (!currentUserId) {
                window.location.href = '/';
                return false;
            }
            
            try {
                const { data, error } = await supabaseClient
                    .from('app_users')
                    .select('*')
                    .eq('id', parseInt(currentUserId))
                    .maybeSingle();
                
                if (data) {
                    userData = data;
                    const displayName = data.first_name || data.username || `مستخدم ${currentUserId}`;
                    document.getElementById('userDisplayName').innerHTML = `<i class="fas fa-user"></i> ${displayName}`;
                    
                    if (!document.getElementById('displayName').value) {
                        document.getElementById('displayName').value = displayName;
                    }
                } else {
                    userData = {
                        id: currentUserId,
                        username: telegramUsername || `user_${currentUserId}`,
                        first_name: telegramUsername || '',
                        created_at: new Date().toISOString()
                    };
                    
                    const { error: insertError } = await supabaseClient
                        .from('app_users')
                        .insert([userData]);
                    
                    if (insertError) {
                        console.error('خطأ في إنشاء المستخدم:', insertError);
                    } else {
                        console.log('تم إنشاء مستخدم جديد');
                    }
                    
                    document.getElementById('userDisplayName').innerHTML = `<i class="fas fa-user"></i> ${telegramUsername || 'مستخدم جديد'}`;
                }
                
                return true;
                
            } catch (error) {
                console.error('خطأ في تحميل بيانات المستخدم:', error);
                document.getElementById('userDisplayName').innerHTML = `<i class="fas fa-user"></i> مستخدم`;
                return true;
            }
        }
        
        function previewBioPage() {
            if (!currentPageUrl) {
                showError('⚠️ لا يوجد رابط لصفحة البايو بعد\nيرجى حفظ البيانات أولاً');
                return;
            }
            window.open(`/bio/${currentPageUrl}`, '_blank');
        }
        
        function logout() {
            if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                localStorage.clear();
                window.location.href = '/';
            }
        }
        
        // =====================================================
        // تهيئة الصفحة
        // =====================================================
        
        async function init() {
            const userLoaded = await loadUserData();
            if (!userLoaded) return;
            await loadBioData();
            console.log('تم تهيئة لوحة التحكم بنجاح');
        }
        
        // ربط الدوال للنطاق العام
        window.addCustomLink = addCustomLink;
        window.removeCustomLink = removeCustomLink;
        window.updateCustomLink = updateCustomLink;
        window.saveBioPage = saveBioPage;
        window.previewBioPage = previewBioPage;
        window.logout = logout;
        window.copyPageUrl = copyPageUrl;
        
        // بدء التهيئة
        init();
    </script>
</body>
