<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاشتراك المميز - جوهرة ماسة | analyzer.social</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/assets/icons/favicon-16x16.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* بطاقات الخطط */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .plan-card {
            background: white;
            border-radius: 28px;
            padding: 25px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            border: 2px solid transparent;
        }
        
        .plan-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .plan-card.selected {
            border-color: #f59e0b;
            background: linear-gradient(135deg, #fff8f0, white);
            box-shadow: 0 10px 30px rgba(245,158,11,0.2);
        }
        
        .plan-card.recommended {
            border: 2px solid #f59e0b;
            position: relative;
        }
        
        .recommended-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f5b042, #f59e0b);
            color: white;
            padding: 4px 16px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
        }
        
        .plan-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .plan-name {
            font-size: 22px;
            font-weight: 800;
            color: #2d3748;
            margin-bottom: 10px;
        }
        
        .plan-price {
            font-size: 32px;
            font-weight: 800;
            color: #f59e0b;
            margin: 15px 0;
        }
        
        .plan-price small {
            font-size: 14px;
            font-weight: normal;
            color: #718096;
        }
        
        .plan-duration {
            font-size: 13px;
            color: #718096;
            margin-bottom: 15px;
        }
        
        .plan-stars {
            background: #fef3c7;
            display: inline-block;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            color: #f59e0b;
            margin-bottom: 15px;
        }
        
        .plan-features {
            text-align: right;
            margin: 20px 0;
            padding: 0 10px;
        }
        
        .plan-features li {
            list-style: none;
            font-size: 12px;
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .plan-features li i {
            color: #28a745;
            font-size: 12px;
        }
        
        /* أقسام الدفع */
        .payment-section {
            background: white;
            border-radius: 28px;
            padding: 30px;
            margin-top: 20px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2d3748;
        }
        
        .payment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .payment-method {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .payment-method:hover {
            transform: translateY(-5px);
            border-color: #f59e0b;
        }
        
        .payment-method img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 10px;
        }
        
        .payment-method-name {
            font-size: 13px;
            font-weight: bold;
            color: #2d3748;
        }
        
        .bank-number {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin: 20px 0;
        }
        
        .bank-number span:first-child {
            display: block;
            font-size: 13px;
            color: #718096;
            margin-bottom: 10px;
        }
        
        .bank-number span:last-child {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            direction: ltr;
            letter-spacing: 2px;
            background: white;
            padding: 12px 20px;
            border-radius: 50px;
            display: inline-block;
        }
        
        .copy-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            margin-top: 10px;
            cursor: pointer;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 25px 0;
        }
        
        .btn-primary {
            flex: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102,126,234,0.4);
        }
        
        .btn-stars {
            background: linear-gradient(135deg, #f5b042, #f59e0b);
        }
        
        .btn-stars:hover {
            box-shadow: 0 8px 20px rgba(245,158,11,0.4);
        }
        
        .warning-box {
            background: #fff3cd;
            border-right: 4px solid #ffc107;
            padding: 15px;
            border-radius: 16px;
            margin-top: 20px;
            font-size: 13px;
            color: #856404;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }
        
        .footer a { color: white; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #28a745;
            color: white;
            text-align: center;
            border-radius: 50px;
            padding: 12px 20px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }
        
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
        
        @media (max-width: 600px) {
            body { padding: 15px; }
            .plans-grid { gap: 15px; }
            .plan-card { padding: 15px; }
            .payment-grid { grid-template-columns: repeat(3, 1fr); }
            .bank-number span:last-child { font-size: 18px; }
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 18px;
        }
        
        .loading i { animation: spin 1s linear infinite; margin-left: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div id="loadingIndicator" class="loading">
            <i class="fas fa-spinner fa-spin"></i> جاري تحميل خطط الاشتراك...
        </div>
        
        <div id="mainContent" style="display: none;">
            <!-- خطط الاشتراك -->
            <div class="plans-grid" id="plansGrid"></div>
            
            <!-- طرق الدفع -->
            <div class="payment-section">
                <div class="section-title">
                    <i class="fas fa-credit-card"></i>
                    <span>طرق الدفع المتاحة</span>
                </div>
                
                <div class="payment-grid" id="paymentGrid"></div>
                
                <!-- التحويل البنكي -->
                <div id="bankSection">
                    <div class="bank-number">
                        <span>📱 رقم المحفظة الموحد للتحويل</span>
                        <span id="bankNumber">772130931</span>
                        <button class="copy-btn" onclick="copyBankNumber()"><i class="fas fa-copy"></i> نسخ الرقم</button>
                    </div>
                </div>
                
                <!-- أزرار الدفع -->
                <div class="action-buttons">
                    <button class="btn-primary btn-stars" id="starsPayBtn" onclick="payWithStars()">
                        <i class="fas fa-star"></i> ⭐ دفع بنجوم Telegram
                    </button>
                    <button class="btn-primary" onclick="payWithBank()">
                        <i class="fas fa-university"></i> 🏦 دفع بنكي / محافظ
                    </button>
                </div>
                
                <div class="warning-box">
                    <i class="fas fa-info-circle"></i> 
                    <strong>تنبيه مهم:</strong> بعد إتمام التحويل، سيتم تفعيل اشتراكك تلقائياً خلال 5-10 دقائق. 
                    للمساعدة والدعم: <a href="https://t.me/Alshabany_Ai" target="_blank" style="color:#667eea;">@Alshabany_Ai</a>
                </div>
            </div>
            
            <div class="footer">
                <p>✨ اشتراك واحد - جميع المميزات - صفحة بايو احترافية</p>
                <p><a href="/dashboard">← العودة للوحة التحكم</a></p>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast">✅ تم نسخ الرقم!</div>
    
    <script>
        // قائمة وسائل الدفع
        const paymentWallets = [
            { id: 'jaib', name: 'جيب', icon: '/static/assets/payment-icons/jaib.webp' },
            { id: 'onecash', name: 'ون كاش', icon: '/static/assets/payment-icons/onecash.webp' },
            { id: 'cash', name: 'كاش', icon: '/static/assets/payment-icons/cash.webp' },
            { id: 'jawaly', name: 'جوالي', icon: '/static/assets/payment-icons/jawaly.webp' },
            { id: 'kremi', name: 'كريمي', icon: '/static/assets/payment-icons/kremi.webp' }
        ];
        
        let plans = [];
        let selectedPlan = null;
        let userId = null;
        let username = null;
        
        // قراءة المعاملات من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        userId = urlParams.get('user_id') || (token ? atob(token).split(':')[0] : null);
        username = urlParams.get('username') || localStorage.getItem('bio_username');
        
        // أيقونات الخطط
        function getPlanIcon(planId) {
            const icons = {
                'trial': 'fa-gift',
                'yearly': 'fa-calendar-alt',
                'lifetime': 'fa-crown'
            };
            return icons[planId] || 'fa-gem';
        }
        
        // ========== جلب الخطط من قاعدة البيانات ==========
        async function loadPlansFromDatabase() {
            try {
                const response = await fetch('/api/subscription/plans');
                const result = await response.json();
                
                if (result.success && result.plans && result.plans.length > 0) {
                    plans = result.plans;
                    // اختيار الخطة السنوية أولاً إذا وجدت، وإلا أول خطة
                    selectedPlan = plans.find(p => p.id === 'yearly') || plans[0];
                    renderPlans();
                    renderPaymentMethods();
                    
                    // إخفاء التحميل وإظهار المحتوى
                    document.getElementById('loadingIndicator').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                } else {
                    throw new Error('No plans found');
                }
            } catch (error) {
                console.error('Error loading plans:', error);
                document.getElementById('loadingIndicator').innerHTML = `
                    <i class="fas fa-exclamation-triangle"></i> 
                    خطأ في تحميل البيانات. يرجى تحديث الصفحة
                    <button onclick="location.reload()" style="display: block; margin: 20px auto; background: white; color: #667eea; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">إعادة المحاولة</button>
                `;
            }
        }
        
        function renderPlans() {
            const container = document.getElementById('plansGrid');
            if (!container) return;
            
            container.innerHTML = plans.map((plan, index) => `
                <div class="plan-card ${plan.id === 'yearly' ? 'recommended' : ''} ${selectedPlan && selectedPlan.id === plan.id ? 'selected' : ''}" 
                     onclick="selectPlan('${plan.id}')">
                    ${plan.id === 'yearly' ? '<div class="recommended-badge"><i class="fas fa-star"></i> الأكثر طلباً</div>' : ''}
                    <div class="plan-icon"><i class="fas ${getPlanIcon(plan.id)}"></i></div>
                    <div class="plan-name">${plan.display_name || plan.name}</div>
                    <div class="plan-price">$${plan.price}<small> / ${plan.duration_text}</small></div>
                    <div class="plan-stars"><i class="fas fa-star"></i> ${plan.price_stars} نجمة Telegram</div>
                    <ul class="plan-features">
                        ${(plan.features || []).map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('')}
                        ${(!plan.features || plan.features.length === 0) ? '<li><i class="fas fa-check-circle"></i> رابط مخصص</li><li><i class="fas fa-check-circle"></i> جميع الثيمات</li><li><i class="fas fa-check-circle"></i> وسائل دفع غير محدودة</li>' : ''}
                    </ul>
                </div>
            `).join('');
        }
        
        function renderPaymentMethods() {
            const container = document.getElementById('paymentGrid');
            if (!container) return;
            
            container.innerHTML = paymentWallets.map(wallet => `
                <div class="payment-method" onclick="copyWalletNumber('${wallet.name}')">
                    <img src="${wallet.icon}" alt="${wallet.name}" onerror="this.src='/static/assets/payment-icons/placeholder.png'">
                    <div class="payment-method-name">${wallet.name}</div>
                </div>
            `).join('');
        }
        
        function selectPlan(planId) {
            selectedPlan = plans.find(p => p.id === planId);
            renderPlans();
        }
        
        function payWithStars() {
            if (!selectedPlan) {
                showToast('⚠️ الرجاء اختيار خطة أولاً');
                return;
            }
            
            const botUsername = 'analyzer_social_bot';
            const startParam = `premium_${selectedPlan.id}_${userId || ''}`;
            window.open(`https://t.me/${botUsername}?start=${startParam}`, '_blank');
            showToast('⭐ تم توجيهك إلى البوت لإتمام الدفع بالنجوم');
        }
        
        function payWithBank() {
            if (!selectedPlan) {
                showToast('⚠️ الرجاء اختيار خطة أولاً');
                return;
            }
            
            const plan = selectedPlan;
            const message = `💰 طلب ترقية حساب مميز - analyzer.social\n\n🆔 معرف المستخدم: ${userId || 'غير معروف'}\n👤 اسم المستخدم: @${username || 'غير معروف'}\n📋 الباقة: ${plan.display_name || plan.name}\n💰 المبلغ: $${plan.price}\n📅 المدة: ${plan.duration_text}\n⭐ قيمة النجوم: ${plan.price_stars} نجمة\n📱 رقم التحويل: 772130931\n\n✅ تم التحويل إلى الرقم الموحد، يرجى التفعيل`;
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://t.me/Alshabany_Ai?text=${encodedMessage}`, '_blank');
            showToast('📤 تم توجيهك إلى المطور. أرسل صورة الإيداع مع المعرف الخاص بك');
        }
        
        function copyBankNumber() {
            const number = '772130931';
            navigator.clipboard.writeText(number);
            showToast('✅ تم نسخ رقم المحفظة الموحد (772130931)');
        }
        
        function copyWalletNumber(walletName) {
            const number = '772130931';
            navigator.clipboard.writeText(number);
            showToast(`✅ تم نسخ رقم محفظة ${walletName} (${number})`);
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }
        
        // بدء التحميل
        loadPlansFromDatabase();
    </script>
</body>
</html>
