    <style>
        /* ===== القواعد الأساسية ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {

            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        
        .avatar-fallback {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 56px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .avatar-fallback span { font-size: 64px; }
        
        .avatar-container.loading { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.6; transform: scale(0.98); }
        }
        
        h1 { font-size: 28px; margin-bottom: 8px; }
        .username { font-size: 14px; margin-bottom: 20px; color: #718096; }
        
        .bio {

        /* أزرار الحسابات */
        .account-btn {

        .account-btn span {
            flex: 1;
            text-align: center;
            margin-right: -28px;
        }

            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;

            transition: transform 0.3s ease;

        /* ألوان المنصات */

        @media (max-width: 600px) {
            body { padding: 15px; }

        @media (min-width: 601px) and (max-width: 900px) { .payment-grid { grid-template-columns: repeat(6, 1fr); } }
        @media (min-width: 901px) { .payment-grid { grid-template-columns: repeat(6, 1fr); } }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* شاشة التحميل */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            transition: opacity 0.5s ease-out;

        .loader { width: 60px; height: 60px; border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; color: white; font-size: 16px; }
        
        /* نافذة منبثقة لنسخ الرقم */
        .payment-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center;
            align-items: center; z-index: 10000; backdrop-filter: blur(5px);
        }
        .payment-modal-content {
            background: white; border-radius: 28px; padding: 30px 25px;
            max-width: 340px; width: 90%; text-align: center; direction: rtl;
            font-family: 'Tajawal', sans-serif; animation: fadeInUp 0.3s ease;
        }
        .payment-modal-icon { font-size: 55px; margin-bottom: 10px; }
        .payment-modal-title { color: #2d3748; margin-bottom: 15px; font-size: 20px; }
        .payment-modal-number {
            background: #f0f4ff; padding: 18px; border-radius: 20px; margin: 20px 0;
            direction: ltr; word-break: break-all;
        }
        .payment-modal-number span:first-child {
            font-size: 12px; color: #718096; display: block; margin-bottom: 8px;
        }
        .payment-modal-number span:last-child {
            font-size: 22px; font-weight: bold; color: #667eea;
        }
        .payment-modal-btn {
            border: none; padding: 14px 20px; border-radius: 60px;
            font-size: 16px; font-weight: bold; width: 100%; margin-bottom: 12px;
            cursor: pointer; transition: all 0.3s ease;
        }
        .payment-modal-btn:hover { transform: translateY(-2px); opacity: 0.95; }
        .btn-copy { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-store { background: #48bb78; color: white; }
        .btn-close { background: transparent; color: #a0aec0; border: none; font-size: 14px; }
    </style>
</head>

    <script src="/static/config.js"></script>
    <script>
        // الحصول على البيانات من window
        const supabaseUrl = window.SUPABASE_URL;
        const supabaseKey = window.SUPABASE_ANON_KEY;
        let supabaseClient = null;
        
        // البيانات المباشرة من الخادم (الأفضل)
        let bioDataFromServer = window.BIO_DATA;
        
        // معرف الصفحة (page_url أو username)
        const pageUrl = window.PAGE_URL;
        const username = window.USERNAME;
        
        console.log("🔍 بيانات من الخادم:", bioDataFromServer);
        console.log("🔍 page_url:", pageUrl);
        console.log("🔍 username:", username);
        
        // =====================================================
        // قائمة المحافظ الإلكترونية مع روابط المتاجر
        // =====================================================
        
        const paymentWallets = [
            { id: 'jaib', name: 'جيب', storeUrl: 'https://play.google.com/store/apps/details?id=com.jaib.app' },
            { id: 'floosak', name: 'فلوسك', storeUrl: 'https://play.google.com/store/apps/details?id=co.ysys.floosak' },
            { id: 'jawaly', name: 'جوالي', storeUrl: '' },
            { id: 'mahfazti', name: 'محفظتي', storeUrl: '' },
            { id: 'mobilemoney', name: 'موبايل موني', storeUrl: 'https://play.google.com/store/apps/details?id=cac.mobilemoney.app' },
            { id: 'yemenwallet', name: 'يمن والت', storeUrl: 'https://play.google.com/store/apps/details?id=com.s2m.yemenpost.customer.android' },
            { id: 'shilling', name: 'شلن', storeUrl: '' },
            { id: 'easywallet', name: 'سهل', storeUrl: '' },
            { id: 'onecash', name: 'ون كاش', storeUrl: '' },
            { id: 'kremi', name: 'كريمي', storeUrl: 'https://play.google.com/store/apps/details?id=com.KuraimiBank' },
            { id: 'cash', name: 'كاش', storeUrl: '' },
            { id: 'mtnmomo', name: 'MTN Mobile Money', storeUrl: '' }
        ];
        
        const platformNames = { 
            youtube: 'يوتيوب', instagram: 'انستقرام', tiktok: 'تيك توك',
            facebook: 'فيسبوك', twitter: 'X', snapchat: 'سناب شات',
            linkedin: 'لينكد إن', github: 'جيت هاب', telegram: 'تيليجرام',
            whatsapp: 'واتساب'
        };
        
        // =====================================================
        // دالة معالجة رابط فيسبوك
        // =====================================================
        
        function getFacebookUrl(identifier) {
            if (!identifier) return '#';
            if (/^\d+$/.test(identifier)) {
                return `https://www.facebook.com/profile.php?id=${identifier}`;
            }
            return `https://facebook.com/${identifier}`;
        }
        
        // =====================================================
        // دالة تطبيق الثيم
        // =====================================================
        
        function applyTheme(themeName) {
            const themeMap = {
                'default': '/static/themes/default.css', 'dark': '/static/themes/dark.css',
                'green': '/static/themes/green.css', 'pink': '/static/themes/pink.css',
                'ocean': '/static/themes/ocean.css'
            };
            const themeUrl = themeMap[themeName] || themeMap['default'];
            const themeLink = document.getElementById('themeStylesheet');
            if (themeLink) themeLink.href = themeUrl;
        }
        
        // =====================================================
        // دالة عرض الصورة الشخصية
        // =====================================================
        
        function displayAvatar(avatarUrl, displayName) {
            const avatarContent = document.getElementById('avatarContent');
            if (avatarUrl && avatarUrl.trim()) {
                avatarContent.innerHTML = `<img src="${avatarUrl}" class="avatar" alt="صورة ${displayName}" onerror="this.parentElement.innerHTML='<div class=\"avatar-fallback\"><span>${(displayName || '?').charAt(0)}</span></div>'">`;
            } else {
                const firstLetter = displayName ? displayName.charAt(0) : '?';
                avatarContent.innerHTML = `<div class="avatar-fallback"><span>${firstLetter}</span></div>`;
            }
        }
        
        // =====================================================
        // دالة عرض حسابات التواصل (مع دعم فيسبوك)
        // =====================================================
        
        function displayAccounts(accounts) {
            const container = document.getElementById('accountsContainer');
            if (!container) return;
            let html = '';
            for (const [platform, identifier] of Object.entries(accounts)) {
                let username = null;
                if (typeof identifier === 'string') username = identifier;
                else if (identifier && typeof identifier === 'object' && identifier.account_identifier) username = identifier.account_identifier;
                if (username) {
                    const cleanIdentifier = username.replace('@', '');
                    let url = '';
                    switch(platform) {
                        case 'youtube': url = `https://youtube.com/@${cleanIdentifier}`; break;
                        case 'instagram': url = `https://instagram.com/${cleanIdentifier}`; break;
                        case 'tiktok': url = `https://tiktok.com/@${cleanIdentifier}`; break;
                        case 'facebook': url = getFacebookUrl(cleanIdentifier); break;
                        case 'twitter': url = `https://twitter.com/${cleanIdentifier}`; break;
                        case 'snapchat': url = `https://snapchat.com/add/${cleanIdentifier}`; break;
                        case 'linkedin': url = `https://linkedin.com/in/${cleanIdentifier}`; break;
                        case 'github': url = `https://github.com/${cleanIdentifier}`; break;
                        case 'telegram': url = `https://t.me/${cleanIdentifier}`; break;
                        case 'whatsapp': url = `https://wa.me/${cleanIdentifier}`; break;
                        default: continue;
                    }
                    html += `<a href="${url}" class="account-btn platform-${platform}" target="_blank" rel="noopener noreferrer"><i class="fab fa-${platform}"></i><span>${platformNames[platform] || platform}</span></a>`;
                }
            }
            container.innerHTML = html;
        }
        
        // =====================================================
        // دالة عرض الروابط المخصصة
        // =====================================================
        
        function displayCustomLinks(links) {
            const container = document.getElementById('customLinksContainer');
            if (!container) return;
            if (links && links.length > 0) {
                let html = '';
                for (const link of links) {
                    if (link.url && link.title) {
                        html += `<a href="${link.url}" class="account-btn custom-link" target="_blank" rel="noopener noreferrer"><i class="fas fa-link"></i><span>${link.title}</span></a>`;
                    }
                }
                container.innerHTML = html;
            }
        }
        
        // =====================================================
        // دالة عرض جهات الاتصال (الجوال والإيميل)
        // =====================================================
        
        function displayContacts(contacts) {
            const contactsSection = document.getElementById('contactsSection');
            const phoneContainer = document.getElementById('phoneContainer');
            const emailContainer = document.getElementById('emailContainer');
            const phoneLink = document.getElementById('phoneLink');
            const emailLink = document.getElementById('emailLink');
            const phoneText = document.getElementById('phoneText');
            const emailText = document.getElementById('emailText');
            
            if (!contactsSection) return;
            let hasAnyContact = false;
            
            if (contacts && contacts.phone && contacts.phone.trim()) {
                const phone = contacts.phone.trim();
                phoneLink.href = `tel:${phone}`;
                phoneText.innerText = `📱 اتصال: ${phone}`;
                phoneContainer.style.display = 'block';
                hasAnyContact = true;
            } else {
                phoneContainer.style.display = 'none';
            }
            
            if (contacts && contacts.email && contacts.email.trim()) {
                const email = contacts.email.trim();
                emailLink.href = `mailto:${email}`;
                emailText.innerText = `✉️ ${email}`;
                emailContainer.style.display = 'block';
                hasAnyContact = true;
            } else {
                emailContainer.style.display = 'none';
            }
            
            contactsSection.style.display = hasAnyContact ? 'block' : 'none';
        }
        
        // =====================================================
        // دالة تتبع النقرات
        // =====================================================
        
        async function trackPaymentClick(methodKey, accountNumber) {
            try {
                // استخدام page_url أو username
                const identifier = pageUrl || username;
                await fetch('/api/payment/click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ method_key: methodKey, account_number: accountNumber, page_url: identifier })
                });
            } catch (error) { console.error('Error tracking click:', error); }
        }
        
        // =====================================================
        // نافذة نسخ الرقم
        // =====================================================
        
        function showPaymentModal(methodName, accountNumber, storeUrl) {
            const modal = document.createElement('div');
            modal.className = 'payment-modal';
            modal.innerHTML = `
                <div class="payment-modal-content">
                    <div class="payment-modal-icon">💰</div>
                    <h3 class="payment-modal-title">التحويل عبر ${methodName}</h3>
                    <div class="payment-modal-number">
                        <span>📱 رقم المحفظة</span>
                        <span>${accountNumber}</span>
                    </div>
                    <button class="payment-modal-btn btn-copy" id="modalCopyBtn">
                        📋 نسخ الرقم
                    </button>
                    <button class="payment-modal-btn btn-store" id="modalStoreBtn">
                        📲 تحميل التطبيق
                    </button>
                    <button class="payment-modal-btn btn-close" id="modalCloseBtn">
                        إغلاق
                    </button>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            document.getElementById('modalCopyBtn').onclick = async () => {
                try {
                    await navigator.clipboard.writeText(accountNumber);
                    const copyBtn = document.getElementById('modalCopyBtn');
                    copyBtn.innerHTML = '✅ تم النسخ!';
                    copyBtn.style.background = '#28a745';
                    setTimeout(() => {
                        copyBtn.innerHTML = '📋 نسخ الرقم';
                        copyBtn.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
                    }, 2000);
                } catch (err) {
                    const textarea = document.createElement('textarea');
                    textarea.value = accountNumber;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    alert('✅ تم نسخ الرقم!');
                }
            };
            
            document.getElementById('modalStoreBtn').onclick = () => {
                if (storeUrl) {
                    window.open(storeUrl, '_blank');
                } else {
                    window.open(`https://play.google.com/store/search?q=${methodName}`, '_blank');
                }
            };
            
            document.getElementById('modalCloseBtn').onclick = () => modal.remove();
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }
        
        // =====================================================
        // دالة عرض وسائل الدفع
        // =====================================================
        
        async function displayPaymentMethods(bioPageId, pageIdentifier) {
            const section = document.getElementById('paymentSection');
            const grid = document.getElementById('paymentGrid');
            if (!section || !grid) return;
            
            try {
                // استخدام page_url أو username للبحث
                const identifier = pageIdentifier || pageUrl || username;
                const response = await fetch(`/api/payment/load-page?page_url=${identifier}`);
                const result = await response.json();
                
                console.log("🔍 وسائل الدفع:", result);
                
                if (!result.success || !result.payment_methods) {
                    section.style.display = 'none';
                    return;
                }
                
                const activeWallets = paymentWallets.filter(wallet => result.payment_methods[wallet.id]);
                if (activeWallets.length === 0) {
                    section.style.display = 'none';
                    return;
                }
                
                let html = '';
                for (const wallet of activeWallets) {
                    const accountNumber = result.payment_methods[wallet.id];
                    html += `
                        <div class="payment-item" onclick="handlePaymentClick('${wallet.id}', '${accountNumber.replace(/'/g, "\\'")}', '${wallet.name}', '${wallet.storeUrl}')">
                            <img src="/static/assets/payment-icons/${wallet.id}.webp" 
                                 alt="${wallet.name}" class="payment-icon"
                                 onerror="this.src='/static/assets/payment-icons/placeholder.png'">
                            <span class="payment-name">${wallet.name}</span>
                        </div>
                    `;
                }
                
                grid.innerHTML = html;
                section.style.display = 'block';
            } catch (error) {
                console.error('Error loading payment methods:', error);
                section.style.display = 'none';
            }
        }
        
        window.handlePaymentClick = async function(methodKey, accountNumber, methodName, storeUrl) {
            await trackPaymentClick(methodKey, accountNumber);
            showPaymentModal(methodName, accountNumber, storeUrl);
        };
        
        // =====================================================
        // دالة عرض الصفحة باستخدام البيانات المباشرة
        // =====================================================
        
        function displayBioPageFromData(data) {
            if (!data) {
                showError('الصفحة غير موجودة');
                return;
            }
            
            console.log("✅ عرض بيانات الصفحة:", data);
            
            // تحديث عنوان الصفحة
            document.title = `${data.display_name || 'صفحة بايو'} | analyzer.social`;
            
            // عرض المعلومات الأساسية
            document.getElementById('displayName').innerText = data.display_name || 'مستخدم';
            
            // عرض اسم المستخدم المخصص إذا وجد
            const usernameElement = document.getElementById('username');
            if (data.username) {
                usernameElement.innerText = `@${data.username}`;
                usernameElement.style.display = 'block';
            } else {
                usernameElement.style.display = 'none';
            }
            
            document.getElementById('bio').innerHTML = (data.bio || '').replace(/\n/g, '<br>');
            document.getElementById('views').innerHTML = `👁️ ${data.views_count || 0} مشاهدة`;
            
            // تحديث Open Graph
            const ogTitle = document.querySelector('meta[property="og:title"]');
            if (ogTitle) ogTitle.setAttribute('content', `صفحة البايو | ${data.display_name || 'مستخدم'}`);
            
            const ogUrl = document.querySelector('meta[property="og:url"]');
            if (ogUrl) ogUrl.setAttribute('content', window.location.href);
            
            // تطبيق الثيم
            applyTheme(data.theme_name || 'default');
            
            // عرض الصورة الشخصية
            displayAvatar(data.avatar_url, data.display_name);
            
            // عرض الحسابات والروابط
            displayAccounts(data.accounts || {});
            displayCustomLinks(data.custom_links || []);
            displayContacts(data.contacts || {});
            
            // عرض وسائل الدفع (باستخدام page_url أو username)
            const identifier = data.page_url || data.username;
            displayPaymentMethods(data.id, identifier);
            
            // إخفاء شاشة التحميل وعرض المحتوى
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                }, 500);
            }, 300);
        }
        
        // =====================================================
        // دالة تحميل الصفحة - تعتمد على البيانات المباشرة أولاً
        // =====================================================
        
        async function loadBioPage() {
            // أولاً: إذا كانت البيانات موجودة من الخادم مباشرة
            if (bioDataFromServer && bioDataFromServer !== 'null') {
                console.log("✅ استخدام البيانات المباشرة من الخادم");
                displayBioPageFromData(bioDataFromServer);
                return;
            }
            
            // ثانياً: إذا لم تكن هناك بيانات مباشرة، نحاول جلبها من API
            console.log("⚠️ لا توجد بيانات مباشرة، جلب من API...");
            
            if (!supabaseClient) {
                supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
            }
            
            try {
                let query;
                if (pageUrl) {
                    query = supabaseClient
                        .from('bio_pages')
                        .select('*')
                        .eq('page_url', pageUrl)
                        .eq('is_active', true);
                } else if (username) {
                    query = supabaseClient
                        .from('bio_pages')
                        .select('*')
                        .eq('username', username)
                        .eq('is_active', true);
                } else {
                    showError('معرف الصفحة غير موجود');
                    return;
                }
                
                const { data, error } = await query.single();
                
                if (error) throw error;
                
                if (data) {
                    displayBioPageFromData(data);
                } else {
                    showError('الصفحة غير موجودة');
                }
            } catch (error) {
                console.error('Error loading bio:', error);
                showError('حدث خطأ في تحميل الصفحة');
            }
        }
        
        function showError(message) {
            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.innerHTML = `<div style="text-align:center;color:white;"><h2>❌ ${message}</h2><p>عذراً، لم نتمكن من العثور على هذه الصفحة</p><a href="/" style="color:white;margin-top:20px;display:inline-block;">← العودة للرئيسية</a></div>`;
        }
        
        // =====================================================
        // تهيئة Supabase وبدء التحميل
        // =====================================================
        
        function init() {
            if (supabaseUrl && supabaseKey) {
                supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
            }
            loadBioPage();
        }
        
        init();
    </script>
</body>
