<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحات بايو - أنشئ صفحتك الشخصية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        // تمرير المتغيرات من Flask
        window.SUPABASE_URL = '{{ SUPABASE_URL }}';
        window.SUPABASE_ANON_KEY = '{{ SUPABASE_ANON_KEY }}';
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .logo { font-size: 60px; margin-bottom: 20px; }
        h1 { color: #2d3748; margin-bottom: 10px; }
        p { color: #718096; margin-bottom: 30px; }
        .telegram-login-btn { margin: 20px 0; }
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .feature {
            text-align: center;
            font-size: 12px;
            color: #718096;
        }
        .feature i {
            font-size: 24px;
            color: #667eea;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📄</div>
        <h1>صفحات بايو احترافية</h1>
        <p>أنشئ صفحة شخصية تعرض جميع حساباتك في مكان واحد</p>
        
        <div class="telegram-login-btn">
            <script async src="https://telegram.org/js/telegram-widget.js?22"
                data-telegram-login="Social_Media_analyzer_bot"
                data-size="large"
                data-radius="12"
                data-auth-url="https://social-analyzer-website.onrender.com/auth"
                data-request-access="write">
            </script>
        </div>
        
        <div class="features">
            <div class="feature"><i class="fas fa-link"></i> روابط مخصصة</div>
            <div class="feature"><i class="fas fa-palette"></i> ثيمات متعددة</div>
            <div class="feature"><i class="fas fa-chart-line"></i> إحصائيات المشاهدات</div>
        </div>
    </div>
    
    <script src="/static/config.js"></script>
    <script>
        const savedToken = localStorage.getItem('bio_token');
        if (savedToken) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
