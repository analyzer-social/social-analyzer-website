<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Analyzer - تسجيل الدخول</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* أنماط إضافية للصفحة الرئيسية */
        .telegram-login-btn iframe {
            width: 100%;
            height: 76px;
            border: none;
            overflow: hidden;
        }
        .btn-telegram-real {
            width: 100%;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        .btn-telegram-real:hover {
            background: #006699;
            transform: translateY(-2px);
        }
        .btn-google-real {
            width: 100%;
            background: #ea4335;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        .btn-google-real:hover {
            background: #c5221f;
            transform: translateY(-2px);
        }
        .coming-soon-badge {
            display: inline-block;
            background: #f0ad4e;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Hero Section -->
        <div class="auth-hero">
            <div class="logo-wrapper">
                <img src="/static/assets/icons/android-chrome-192x192.png" alt="Logo" class="auth-logo" 
                     onerror="this.src='https://cdn-icons-png.flaticon.com/512/906/906361.png'">
            </div>
            <h1>🤖 Social Analyzer</h1>
            <p>تحليل متقدم لحسابات التواصل الاجتماعي | توصيات ذكاء اصطناعي | تقارير شاملة</p>
        </div>

        <!-- Login Cards -->
        <div class="auth-cards">
            <!-- تسجيل الدخول عبر تلغرام -->
            <div class="auth-card telegram-card">
                <i class="fab fa-telegram telegram-icon"></i>
                <h3>تسجيل الدخول عبر تلغرام</h3>
                <p>استخدم حساب تلغرام الخاص بك للدخول فوراً</p>
                
                <!-- زر تلغرام الرسمي -->
                <div class="telegram-login-btn" id="telegramLoginBtn">
                    <script async src="https://telegram.org/js/telegram-widget.js?22"
                        data-telegram-login="Social_Media_analyzer_bot"
                        data-size="large"
                        data-auth-url="https://social-analyzer-website.onrender.com/auth/telegram-callback.html"
                        data-request-access="write">
                    </script>
                </div>
            </div>

            <!-- تسجيل الدخول عبر جوجل -->
            <div class="auth-card google-card">
                <i class="fab fa-google google-icon"></i>
                <h3>تسجيل الدخول عبر جوجل</h3>
                <p>استخدم بريدك الإلكتروني للدخول</p>
                
                <button class="btn-google-real" onclick="initGoogleLogin()">
                    <i class="fab fa-google"></i> تسجيل الدخول بـ Google
                    <span class="coming-soon-badge">قريباً</span>
                </button>
            </div>
        </div>

        <!-- Footer Links -->
        <div class="auth-footer">
            <a href="/terms">📜 شروط الخدمة</a>
            <a href="/privacy">🔐 سياسة الخصوصية</a>
            <a href="https://t.me/Social_Media_analyzer_bot">🤖 البوت الرئيسي</a>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastMessage" class="toast-message"></div>

    <script>
        // إشعارات مؤقتة
        function showToast(message, isError = false) {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.style.background = isError ? '#f56565' : '#48bb78';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // مصادقة جوجل (قيد التطوير)
        function initGoogleLogin() {
            showToast('🚧 ميزة تسجيل الدخول عبر جوجل قيد التطوير حالياً، يرجى استخدام تلغرام', true);
        }

        // التحقق من التوكن الموجود
        window.addEventListener('load', function() {
            const token = localStorage.getItem('social_analyzer_token');
            if (token) {
                // التحقق من صحة التوكن مع الخادم
                fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/dashboard.html';
                    }
                })
                .catch(() => {});
            }
        });
    </script>
</body>
</html>
