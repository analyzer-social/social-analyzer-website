<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم صفحة البايو</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        /* تبويبات */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
        }
        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: bold;
            color: #718096;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 12px 12px 0 0;
        }
        .tab-btn.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            background: #f0f4ff;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* النماذج */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #2d3748; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        textarea { resize: vertical; min-height: 80px; }
        .platform-input {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .platform-input i {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: white;
            font-size: 20px;
        }
        .platform-input input { flex: 1; }
        .custom-link-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .custom-link-item input:first-child { width: 30%; }
        .custom-link-item input:last-child { width: 60%; }
        .remove-link {
            background: #f56565;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
        }
        .add-link {
            background: #48bb78;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }
        .save-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .save-btn:hover { opacity: 0.95; transform: translateY(-2px); }
        .page-url {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: center;
        }
        .page-url a { color: #667eea; text-decoration: none; font-weight: bold; }
        .success-msg, .error-msg {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        .success-msg { background: #c6f6d5; color: #22543d; }
        .error-msg { background: #fed7d7; color: #742a2a; }
        .theme-preview {
            margin-top: 10px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
        }
        .row-2cols { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .logout-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            margin-bottom: 20px;
        }
        /* معاينة البايو */
        .preview-container {
            background: #f7fafc;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .preview-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
        }
        .preview-name { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .preview-bio { color: #718096; margin-bottom: 20px; }
        .preview-links { margin-top: 20px; }
        .preview-link {
            display: block;
            background: white;
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            text-decoration: none;
            color: #2d3748;
            border: 1px solid #e2e8f0;
        }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            .row-2cols { grid-template-columns: 1fr; }
            .custom-link-item { flex-wrap: wrap; }
            .custom-link-item input:first-child, .custom-link-item input:last-child { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>📄 إعدادات صفحة البايو</h1>
            <button class="logout-btn" onclick="logout()">🚪 تسجيل الخروج</button>
        </div>
        
        <!-- تبويبات -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('settings')">⚙️ الإعدادات</button>
            <button class="tab-btn" onclick="switchTab('preview')">👁️ معاينة الصفحة</button>
        </div>
        
        <!-- تبويب الإعدادات -->
        <div id="settingsTab" class="tab-content active">
            <div id="successMsg" class="success-msg">✅ تم حفظ التغييرات بنجاح!</div>
            <div id="errorMsg" class="error-msg">❌ حدث خطأ، يرجى المحاولة مرة أخرى</div>

            <div class="form-group">
                <label>🖼️ رابط الصورة الشخصية (اختياري)</label>
                <input type="url" id="avatarUrl" placeholder="https://example.com/avatar.jpg">
            </div>

            <div class="row-2cols">
                <div class="form-group">
                    <label>📝 الاسم المعروض</label>
                    <input type="text" id="displayName" placeholder="الاسم الذي سيظهر للزوار">
                </div>
                <div class="form-group">
                    <label>🔗 رابط صفحتك</label>
                    <div class="page-url">
                        analyzer.social/bio/<span id="pageUrlValue" style="color:#667eea;font-weight:bold;">...</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>📖 السيرة الذاتية (نبذة عنك)</label>
                <textarea id="bio" placeholder="اكتب نبذة قصيرة عن نفسك..."></textarea>
            </div>

            <div class="form-group">
                <label>🎨 الثيم</label>
                <select id="theme">
                    <option value="default">🌞 افتراضي (فاتح)</option>
                    <option value="dark">🌙 داكن</option>
                    <option value="green">🍃 أخضر</option>
                    <option value="pink">🌸 وردي</option>
                    <option value="ocean">🌊 محيط</option>
                </select>
                <div id="themePreview" class="theme-preview">معاينة سريعة للثيم</div>
            </div>

            <div class="form-group">
                <label>📱 حسابات التواصل الاجتماعي</label>
                <div class="platform-input">
                    <i class="fab fa-youtube" style="background:#ff0000;"></i>
                    <input type="text" id="youtube" placeholder="معرف قناة يوتيوب (مثال: @username)">
                </div>
                <div class="platform-input">
                    <i class="fab fa-instagram" style="background:#e1306c;"></i>
                    <input type="text" id="instagram" placeholder="معرف انستقرام (مثال: @username)">
                </div>
                <div class="platform-input">
                    <i class="fab fa-tiktok" style="background:#000000;"></i>
                    <input type="text" id="tiktok" placeholder="معرف تيك توك (مثال: @username)">
                </div>
                <div class="platform-input">
                    <i class="fab fa-facebook-f" style="background:#1877f2;"></i>
                    <input type="text" id="facebook" placeholder="معرف فيسبوك (مثال: username)">
                </div>
                <div class="platform-input">
                    <i class="fab fa-twitter" style="background:#1da1f2;"></i>
                    <input type="text" id="twitter" placeholder="معرف X (تويتر)">
                </div>
            </div>

            <div class="form-group">
                <label>🔗 روابط مخصصة</label>
                <div id="customLinksContainer"></div>
                <button type="button" class="add-link" onclick="addCustomLink()">+ إضافة رابط مخصص</button>
            </div>

            <button class="save-btn" onclick="saveBioPage()">💾 حفظ التغييرات</button>
        </div>
        
        <!-- تبويب المعاينة -->
        <div id="previewTab" class="tab-content">
            <div class="preview-container" id="previewContainer">
                <div class="preview-avatar" id="previewAvatar">?</div>
                <div class="preview-name" id="previewName">الاسم المعروض</div>
                <div class="preview-bio" id="previewBio">السيرة الذاتية ستظهر هنا</div>
                <div id="previewLinks"></div>
            </div>
            <p style="text-align: center; margin-top: 15px; font-size: 12px; color: #718096;">
                <i class="fas fa-info-circle"></i> هذه معاينة تقريبية، التصميم النهائي قد يختلف حسب الثيم
            </p>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let customLinks = [];
        let currentUserId = null;
        let currentPageUrl = null;
        
        // التحقق من تسجيل الدخول
        const token = localStorage.getItem('bio_token');
        if (!token) {
            window.location.href = '/index.html';
        }
        
        currentUserId = localStorage.getItem('bio_user_id');
        
        // التبديل بين التبويبات
        function switchTab(tabName) {
            const settingsTab = document.getElementById('settingsTab');
            const previewTab = document.getElementById('previewTab');
            const btns = document.querySelectorAll('.tab-btn');
            
            if (tabName === 'settings') {
                settingsTab.classList.add('active');
                previewTab.classList.remove('active');
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                settingsTab.classList.remove('active');
                previewTab.classList.add('active');
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
                updatePreview();  // تحديث المعاينة عند التبديل
            }
        }
        
        // تحديث المعاينة
        function updatePreview() {
            const name = document.getElementById('displayName').value || 'الاسم المعروض';
            const bio = document.getElementById('bio').value || 'السيرة الذاتية ستظهر هنا';
            const avatarUrl = document.getElementById('avatarUrl').value;
            const previewAvatar = document.getElementById('previewAvatar');
            const previewName = document.getElementById('previewName');
            const previewBio = document.getElementById('previewBio');
            const previewLinks = document.getElementById('previewLinks');
            
            previewName.innerText = name;
            previewBio.innerText = bio;
            
            // معاينة الصورة
            if (avatarUrl) {
                previewAvatar.style.backgroundImage = `url(${avatarUrl})`;
                previewAvatar.style.backgroundSize = 'cover';
                previewAvatar.style.backgroundPosition = 'center';
                previewAvatar.innerText = '';
            } else {
                previewAvatar.style.backgroundImage = '';
                previewAvatar.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
                previewAvatar.innerText = name.charAt(0) || '?';
            }
            
            // معاينة الروابط
            let linksHtml = '';
            
            // حسابات التواصل
            const youtube = document.getElementById('youtube').value;
            const instagram = document.getElementById('instagram').value;
            const tiktok = document.getElementById('tiktok').value;
            const facebook = document.getElementById('facebook').value;
            const twitter = document.getElementById('twitter').value;
            
            if (youtube) linksHtml += `<div class="preview-link"><i class="fab fa-youtube" style="color:#ff0000;"></i> يوتيوب: @${youtube.replace('@', '')}</div>`;
            if (instagram) linksHtml += `<div class="preview-link"><i class="fab fa-instagram" style="color:#e1306c;"></i> انستقرام: @${instagram.replace('@', '')}</div>`;
            if (tiktok) linksHtml += `<div class="preview-link"><i class="fab fa-tiktok"></i> تيك توك: @${tiktok.replace('@', '')}</div>`;
            if (facebook) linksHtml += `<div class="preview-link"><i class="fab fa-facebook-f" style="color:#1877f2;"></i> فيسبوك: ${facebook}</div>`;
            if (twitter) linksHtml += `<div class="preview-link"><i class="fab fa-twitter" style="color:#1da1f2;"></i> X: ${twitter}</div>`;
            
            // روابط مخصصة
            customLinks.forEach(link => {
                if (link.title && link.url) {
                    linksHtml += `<div class="preview-link"><i class="fas fa-link"></i> ${link.title}</div>`;
                }
            });
            
            if (!linksHtml) {
                linksHtml = '<div style="color:#a0aec0;">لا توجد روابط مضافة بعد</div>';
            }
            
            previewLinks.innerHTML = linksHtml;
        }
        
        // جلب البيانات الحالية
        async function loadBioData() {
            try {
                const { data, error } = await supabaseClient
                    .from('bio_pages')
                    .select('*')
                    .eq('user_id', parseInt(currentUserId))
                    .maybeSingle();
                
                if (data) {
                    document.getElementById('avatarUrl').value = data.avatar_url || '';
                    document.getElementById('displayName').value = data.display_name || '';
                    document.getElementById('bio').value = data.bio || '';
                    document.getElementById('theme').value = data.theme_name || 'default';
                    
                    const accounts = data.accounts || {};
                    document.getElementById('youtube').value = accounts.youtube?.account_identifier || '';
                    document.getElementById('instagram').value = accounts.instagram?.account_identifier || '';
                    document.getElementById('tiktok').value = accounts.tiktok?.account_identifier || '';
                    document.getElementById('facebook').value = accounts.facebook?.account_identifier || '';
                    document.getElementById('twitter').value = accounts.twitter?.account_identifier || '';
                    
                    currentPageUrl = data.page_url;
                    document.getElementById('pageUrlValue').innerText = currentPageUrl;
                    
                    customLinks = data.custom_links || [];
                    renderCustomLinks();
                    updateThemePreview();
                    updatePreview();  // تحديث المعاينة
                }
            } catch (error) {
                console.error('Error loading bio:', error);
            }
        }
        
        // استمع لتغييرات الحقول لتحديث المعاينة فوراً
        const inputs = ['avatarUrl', 'displayName', 'bio', 'youtube', 'instagram', 'tiktok', 'facebook', 'twitter'];
        inputs.forEach(id => {
            document.getElementById(id)?.addEventListener('input', () => updatePreview());
        });
        
        function renderCustomLinks() {
            const container = document.getElementById('customLinksContainer');
            container.innerHTML = '';
            customLinks.forEach((link, index) => {
                const div = document.createElement('div');
                div.className = 'custom-link-item';
                div.innerHTML = `
                    <input type="text" placeholder="العنوان" value="${escapeHtml(link.title)}" oninput="updateCustomLink(${index}, 'title', this.value); updatePreview();">
                    <input type="url" placeholder="https://..." value="${escapeHtml(link.url)}" oninput="updateCustomLink(${index}, 'url', this.value); updatePreview();">
                    <button class="remove-link" onclick="removeCustomLink(${index})"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(div);
            });
            updatePreview();
        }
        
        function updateCustomLink(index, field, value) {
            customLinks[index][field] = value;
            updatePreview();
        }
        
        function addCustomLink() {
            customLinks.push({ title: 'رابط جديد', url: 'https://' });
            renderCustomLinks();
        }
        
        function removeCustomLink(index) {
            customLinks.splice(index, 1);
            renderCustomLinks();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function updateThemePreview() {
            const theme = document.getElementById('theme').value;
            const preview = document.getElementById('themePreview');
            const themes = {
                default: { bg: '#ffffff', text: '#2d3748', border: '#e2e8f0' },
                dark: { bg: '#1a202c', text: '#f7fafc', border: '#4a5568' },
                green: { bg: '#f0fff4', text: '#22543d', border: '#9ae6b4' },
                pink: { bg: '#fff5f5', text: '#742a2a', border: '#feb2b2' },
                ocean: { bg: '#ebf8ff', text: '#2c5282', border: '#90cdf4' }
            };
            const t = themes[theme] || themes.default;
            preview.style.background = t.bg;
            preview.style.color = t.text;
            preview.style.border = `1px solid ${t.border}`;
            preview.innerHTML = `معاينة: ${theme === 'default' ? 'الوضع الفاتح' : theme === 'dark' ? 'الوضع الداكن' : theme === 'green' ? 'الأخضر' : theme === 'pink' ? 'الوردي' : 'المحيط'}`;
        }
        
        document.getElementById('theme').addEventListener('change', updateThemePreview);
        document.getElementById('theme').addEventListener('change', () => updatePreview());
        
        async function saveBioPage() {
            const accounts = {};
            const youtube = document.getElementById('youtube').value.trim();
            const instagram = document.getElementById('instagram').value.trim();
            const tiktok = document.getElementById('tiktok').value.trim();
            const facebook = document.getElementById('facebook').value.trim();
            const twitter = document.getElementById('twitter').value.trim();
            
            if (youtube) accounts.youtube = { account_identifier: youtube.replace('@', '') };
            if (instagram) accounts.instagram = { account_identifier: instagram.replace('@', '') };
            if (tiktok) accounts.tiktok = { account_identifier: tiktok.replace('@', '') };
            if (facebook) accounts.facebook = { account_identifier: facebook };
            if (twitter) accounts.twitter = { account_identifier: twitter };
            
            const bioData = {
                avatar_url: document.getElementById('avatarUrl').value,
                display_name: document.getElementById('displayName').value,
                bio: document.getElementById('bio').value,
                theme_name: document.getElementById('theme').value,
                accounts: accounts,
                custom_links: customLinks,
                updated_at: new Date().toISOString()
            };
            
            try {
                if (currentPageUrl) {
                    // تحديث
                    const { error } = await supabaseClient
                        .from('bio_pages')
                        .update(bioData)
                        .eq('user_id', parseInt(currentUserId));
                    
                    if (error) throw error;
                } else {
                    // إنشاء جديد
                    const pageUrl = generatePageUrl();
                    const { error } = await supabaseClient
                        .from('bio_pages')
                        .insert([{
                            user_id: parseInt(currentUserId),
                            page_url: pageUrl,
                            ...bioData,
                            is_active: true,
                            created_at: new Date().toISOString()
                        }]);
                    
                    if (error) throw error;
                    currentPageUrl = pageUrl;
                    document.getElementById('pageUrlValue').innerText = pageUrl;
                }
                
                document.getElementById('successMsg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('successMsg').style.display = 'none';
                }, 3000);
                
            } catch (error) {
                console.error('Save error:', error);
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
            }
        }
        
        function generatePageUrl() {
            const name = document.getElementById('displayName').value || 'user';
            const random = Math.random().toString(36).substring(2, 8);
            return `${name.replace(/\s/g, '_').toLowerCase()}_${random}`;
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }
        
        // ربط دوال التبويبات
        window.switchTab = switchTab;
        
        loadBioData();
    </script>
</body>
</html>
